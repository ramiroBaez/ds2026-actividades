<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi CV - Contacto</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>   
            <a href="index.html">Inicio</a>
            <a href="estudios.html">Estudios</a>
            <a href="experiencia.html">Experiencia</a>
            <a href="hobbies.html">Hobbies</a>
            <a href="contacto.html" class="activo">Contacto</a>
        </nav>
        <h1>Ponte en contacto</h1>
    </header>
    
    <hr> <main>
        <section class="formulario-contenedor">
            <form action="#">
                <div class="campo">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="aca va el nombre...">
                </div>

                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="mailejemplo@gmail.com">
                </div>

                <div class="campo">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
                </div>

                <button type="submit" class="boton-enviar">Enviar respuesta</button>
            </form>
        </section>
    </main>
    
</body>
</html>
