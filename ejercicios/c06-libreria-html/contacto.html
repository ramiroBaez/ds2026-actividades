<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librería | Contacto</title>

    <!-- Bootstrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Nuestro CSS propio, DESPUÉS de Bootstrap para poder pisarlo -->
    <link rel="stylesheet" href="css/styles.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

  <!-- navbar: barra de navegación fija arriba -->
  <!-- navbar-expand-lg: en pantallas grandes muestra los links, en chicas los colapsa en un menú hamburguesa -->
  <!-- navbar-dark bg-dark: texto claro sobre fondo oscuro -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

      <!-- Marca/logo del sitio -->
    <a class="navbar-brand" href="index.html">
        <i class="bi bi-book"></i> Librería
    </a>

      <!-- Botón hamburguesa — aparece solo en pantallas chicas -->
      <!-- data-bs-toggle y data-bs-target son atributos de Bootstrap
           que conectan el botón con el menú colapsable -->
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse"
              data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- El menú que se colapsa en pantallas chicas -->
      <!-- El id tiene que coincidir con data-bs-target de arriba -->
      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto">
          <!-- ms-auto empuja los links hacia la derecha -->
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="catalogo.html">Catálogo</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="libro.html">Libro</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contacto.html">Contacto</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <section class="contacto py-5">
  <div class="container">
    <div class="row justify-content-center">

      <!-- El formulario ocupa 8 columnas centradas en pantallas grandes -->
      <div class="col-lg-8">

        <div class="section-header mb-5">
          <h2 class="section-titulo">Contacto</h2>
          <p class="section-sub">Completá el formulario y te respondemos a la brevedad</p>
        </div>

        <form class="form-contacto">

          <!-- Nombre -->
          <!-- mb-4: margen abajo entre cada campo -->
          <div class="mb-4">
            <label for="nombre" class="form-label">Nombre</label>
            <input
              type="text"
              class="form-control campo"
              id="nombre"
              placeholder="Tu nombre completo"
              required>
          </div>

          <!-- Email -->
          <!-- type="email" valida el formato automáticamente -->
          <div class="mb-4">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control campo"
              id="email"
              placeholder="tu@email.com"
              required>
          </div>

          <!-- Asunto — select con opciones -->
          <div class="mb-4">
            <label for="asunto" class="form-label">Asunto</label>
            <select class="form-select campo" id="asunto" required>
              <!-- La primera opción está vacía y deshabilitada -->
              <!-- sirve como placeholder del select -->
              <option value="" disabled selected>Seleccioná un asunto</option>
              <option value="consulta">Consulta</option>
              <option value="reclamo">Reclamo</option>
              <option value="sugerencia">Sugerencia</option>
            </select>
          </div>

          <!-- Mensaje — textarea para texto largo -->
          <!-- rows define la altura inicial en líneas -->
          <div class="mb-5">
            <label for="mensaje" class="form-label">Mensaje</label>
            <textarea
              class="form-control campo"
              id="mensaje"
              rows="5"
              placeholder="Escribí tu mensaje acá..."
              required></textarea>
          </div>

          <!-- Botón de envío -->
          <button type="submit" class="btn btn-enviar w-100">
            Enviar mensaje
            <i class="bi bi-send ms-2"></i>
          </button>

        </form>

      </div>
    </div>
  </div>
</section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
